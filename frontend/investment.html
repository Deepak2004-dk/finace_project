<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Investments — Finace</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="finace-dark.css" />
  <!-- Apply saved theme before page renders to avoid flash -->
  <script>try{var t=localStorage.getItem('ft_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--indigo:#4f46e5;--violet:#7c3aed;--indigo-light:#eef2ff;--indigo-mid:#c7d2fe;--sl50:#f8fafc;--sl100:#f1f5f9;--sl200:#e2e8f0;--sl300:#cbd5e1;--sl500:#64748b;--sl900:#0f172a;--green:#16a34a;--green-bg:#dcfce7;--green-bd:#86efac;--red:#dc2626;--red-bg:#fee2e2;--amber:#d97706;--amber-bg:#fef3c7;--white:#fff;--sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--sh-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);--sh-lg:0 10px 40px rgba(0,0,0,.12);--sh-indigo:0 6px 20px rgba(79,70,229,.22)}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--sl100);color:var(--sl900);overflow-x:hidden}
    .layout{display:flex;min-height:100vh}
    .sidebar{width:240px;flex-shrink:0;background:var(--white);border-right:1px solid var(--sl200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;box-shadow:2px 0 8px rgba(0,0,0,.04);z-index:10}
    .sb-brand{padding:22px 20px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--sl200)}
    .sb-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--violet),var(--indigo));display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(124,58,237,.35)}
    .sb-name{font-size:.95rem;font-weight:700;color:var(--sl900);line-height:1.2}
    .sb-sub{font-size:.72rem;color:var(--sl500)}
    .sb-nav{flex:1;padding:16px 12px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;font-size:.875rem;font-weight:500;color:var(--sl500);cursor:pointer;transition:all .18s;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;text-decoration:none}
    .nav-item:hover{background:var(--sl100);color:var(--sl900)}
    .nav-item.active{background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;font-weight:600;box-shadow:0 4px 14px rgba(79,70,229,.35)}
    .sb-user{padding:16px;border-top:1px solid var(--sl200)}
    .sb-user-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--sl50);margin-bottom:8px}
    .sb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer}
    .sb-uname{font-size:.83rem;font-weight:600;color:var(--sl900);cursor:pointer}
    .sb-uemail{font-size:.71rem;color:var(--sl500);word-break:break-all}
    .sb-logout{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:.83rem;font-weight:500;color:var(--red);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;width:100%;transition:background .15s}
    .sb-logout:hover{background:var(--red-bg)}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
    .top-nav{background:var(--white);border-bottom:1px solid var(--sl200);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--sh-sm)}
    .top-nav-title{font-size:1rem;font-weight:700;color:var(--sl900);display:flex;align-items:center;gap:10px}
    .top-nav-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--indigo),var(--violet));display:flex;align-items:center;justify-content:center;font-size:.88rem;color:#fff}
    .content{padding:28px 28px 40px}
    .page-header{margin-bottom:26px}
    .page-header h1{font-family:'Sora',sans-serif;font-size:1.55rem;font-weight:800;color:var(--sl900);margin-bottom:4px}
    .page-header p{font-size:.86rem;color:var(--sl500)}
    .inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
    .inv-card{background:var(--white);border:1px solid var(--sl200);border-radius:18px;padding:24px 20px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
    .inv-card:hover{transform:translateY(-4px);box-shadow:var(--sh-lg);border-color:var(--indigo-mid)}
    .inv-card-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:14px}
    .inv-card h3{font-size:.95rem;font-weight:700;color:var(--sl900);margin-bottom:4px}
    .inv-card-desc{font-size:.76rem;color:var(--sl500);line-height:1.5;margin-bottom:14px}
    .inv-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--sl200)}
    .inv-card-footer span{font-size:.78rem;font-weight:600;color:var(--indigo)}
    .inv-card-arrow{font-size:.8rem;color:var(--sl500)}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:10000;background:rgba(10,16,35,.55);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:22px;width:100%;max-width:560px;box-shadow:0 28px 70px rgba(0,0,0,.22);animation:popIn .28s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
    @keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--sl200);position:sticky;top:0;background:#fff;z-index:2;border-radius:22px 22px 0 0}
    .modal-header-left{display:flex;align-items:center;gap:12px}
    .modal-header-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
    .modal-header h2{font-size:1rem;font-weight:700;color:var(--sl900)}
    .modal-close{background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--sl500);padding:4px 8px;border-radius:6px}
    .modal-close:hover{color:var(--red);background:var(--red-bg)}
    .modal-body{padding:20px 24px 24px;flex:1;overflow-y:auto}
    .modal-desc{font-size:.85rem;color:#374151;line-height:1.7;margin-bottom:16px}
    .modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
    .modal-info-item{background:var(--sl50);border-radius:10px;padding:12px 14px}
    .modal-info-label{font-size:.7rem;font-weight:600;color:var(--sl500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
    .modal-info-val{font-size:.88rem;font-weight:700;color:var(--sl900)}
    .modal-know-more{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:9px;background:linear-gradient(135deg,var(--indigo),var(--violet));border:none;color:#fff;font-family:'Inter',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer;box-shadow:var(--sh-indigo);transition:all .18s;text-decoration:none}
    .modal-know-more:hover{transform:translateY(-1px)}
    .live-price-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
    .live-price-box{background:linear-gradient(135deg,var(--indigo),var(--violet));border-radius:12px;padding:12px 14px;color:#fff;text-align:center}
    .live-price-box .lp-label{font-size:.65rem;font-weight:600;opacity:.75;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
    .live-price-box .lp-val{font-family:'Sora',sans-serif;font-size:1rem;font-weight:800}
    .live-price-box.silver-box{background:linear-gradient(135deg,#475569,#334155)}
    .calc-section{margin-top:18px;padding-top:18px;border-top:2px solid var(--sl200)}
    .calc-title{font-size:.92rem;font-weight:700;color:var(--sl900);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .calc-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .calc-row.full{grid-template-columns:1fr}
    .calc-field{display:flex;flex-direction:column;gap:5px}
    .calc-field label{font-size:.76rem;font-weight:600;color:var(--sl500)}
    .calc-field input,.calc-field select{padding:9px 12px;border:1.5px solid var(--sl200);border-radius:9px;font-family:'Inter',sans-serif;font-size:.84rem;color:var(--sl900);outline:none;background:var(--sl50);transition:border-color .18s}
    .calc-field input:focus,.calc-field select:focus{border-color:var(--indigo)}
    .calc-result{background:linear-gradient(135deg,var(--indigo),var(--violet));border-radius:14px;padding:16px 18px;margin-top:14px;color:#fff}
    .calc-results-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .calc-res-item{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px}
    .calc-res-label{font-size:.65rem;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
    .calc-res-val{font-family:'Sora',sans-serif;font-size:1rem;font-weight:800}
    .calc-result-sub{font-size:.76rem;opacity:.8;margin-top:8px}
    .calc-range-wrap{margin-bottom:8px}
    .calc-range-label{display:flex;justify-content:space-between;font-size:.76rem;font-weight:600;color:var(--sl500);margin-bottom:6px}
    .calc-range-val{color:var(--indigo);font-weight:700;font-size:.86rem}
    input[type="range"]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--sl200);outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--violet));cursor:pointer;box-shadow:0 2px 8px rgba(79,70,229,.4)}
    .toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--sl900);border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:9px;font-size:.82rem;font-weight:600;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.25);transform:translateY(70px) scale(.95);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
    .sb-logout.hidden,.logout-btn.hidden{display:none!important}
    .toast.show{transform:translateY(0) scale(1);opacity:1}
    @media(max-width:1100px){.inv-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:860px){.sidebar{display:none}.inv-grid{grid-template-columns:repeat(2,1fr)}.content{padding:18px 14px}}
    @media(max-width:500px){.inv-grid{grid-template-columns:1fr}.calc-row{grid-template-columns:1fr}}
  </style>

  <style>
    /* ══════════════════════════════════════════
       DARK THEME OVERRIDE — only when dark
    ══════════════════════════════════════════ */
    html[data-theme="dark"] {
      --white: #111827;
      --sl50:  rgba(255,255,255,.04);
      --sl100: rgba(255,255,255,.05);
      --sl200: rgba(255,255,255,.08);
      --sl300: rgba(255,255,255,.12);
      --sl500: rgba(255,255,255,.45);
      --sl900: #f0f4ff;
      --indigo: #00D4C8;
      --indigo-light: rgba(0,212,200,.1);
      --indigo-mid:   rgba(0,212,200,.25);
      --violet: #8B5CF6;
      --green:  #00E87A;
      --green-bg: rgba(0,232,122,.08);
      --green-bd: rgba(0,232,122,.3);
      --red:    #FF4D6A;
      --red-bg: rgba(255,77,106,.08);
      --amber:  #FFB020;
      --amber-bg: rgba(255,176,32,.08);
      --sh-sm: 0 2px 8px rgba(0,0,0,.4);
      --sh-md: 0 4px 16px rgba(0,0,0,.5);
      --sh-indigo: 0 4px 20px rgba(0,212,200,.2);
    }

    html[data-theme="dark"] body {
      background: #080c14 !important;
      color: #f0f4ff !important;
      font-family: 'Outfit', sans-serif !important;
    }

    /* ── Sidebar ── */
    html[data-theme="dark"] .sidebar {
      background: rgba(10,14,25,.97) !important;
      border-right: 1px solid rgba(255,255,255,.08) !important;
    }
    html[data-theme="dark"] .sb-brand { border-bottom: 1px solid rgba(255,255,255,.08) !important; }
    html[data-theme="dark"] .sb-name  { color: #f0f4ff !important; }
    html[data-theme="dark"] .sb-sub, html[data-theme="dark"] .sb-uemail { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .nav-item { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .nav-item:hover { background: rgba(255,255,255,.06) !important; color: #f0f4ff !important; }
    html[data-theme="dark"] .nav-item.active {
      background: linear-gradient(135deg,#00D4C8,#006B66) !important;
      color: #000 !important;
      box-shadow: 0 4px 14px rgba(0,212,200,.25) !important;
    }
    html[data-theme="dark"] .sb-user { border-top: 1px solid rgba(255,255,255,.08) !important; }
    html[data-theme="dark"] .sb-user-row { background: rgba(255,255,255,.04) !important; }
    html[data-theme="dark"] .sb-uname { color: #f0f4ff !important; }
    html[data-theme="dark"] .sb-logout { color: #FF4D6A !important; }
    html[data-theme="dark"] .sb-logout:hover { background: rgba(255,77,106,.08) !important; }

    /* ── Top nav ── */
    html[data-theme="dark"] .top-nav {
      background: rgba(8,12,20,.92) !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
      box-shadow: none !important;
    }
    html[data-theme="dark"] .top-nav * { color: #f0f4ff !important; }

    /* ── Investment cards ── */
    html[data-theme="dark"] .inv-card {
      background: rgba(255,255,255,.04) !important;
      border: 1px solid rgba(255,255,255,.08) !important;
    }
    html[data-theme="dark"] .inv-card:hover {
      border-color: rgba(0,212,200,.35) !important;
      background: rgba(0,212,200,.04) !important;
      box-shadow: 0 10px 40px rgba(0,0,0,.5) !important;
    }
    html[data-theme="dark"] .inv-card h3 { color: #f0f4ff !important; }
    html[data-theme="dark"] .inv-card-desc { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .inv-card-footer { border-top: 1px solid rgba(255,255,255,.08) !important; }
    html[data-theme="dark"] .inv-card-footer span { color: #00D4C8 !important; }
    html[data-theme="dark"] .inv-card-arrow { color: rgba(255,255,255,.35) !important; }

    /* ── Page header ── */
    html[data-theme="dark"] .page-header h1 { color: #f0f4ff !important; }
    html[data-theme="dark"] .page-header p  { color: rgba(255,255,255,.45) !important; }

    /* ══════════════════════════════════════
       MODAL — dark theme
    ══════════════════════════════════════ */
    html[data-theme="dark"] .modal-box {
      background: #0d1220 !important;
      border: 1px solid rgba(255,255,255,.1) !important;
      color: #f0f4ff !important;
      box-shadow: 0 28px 70px rgba(0,0,0,.7) !important;
    }
    html[data-theme="dark"] .modal-header {
      background: #0d1220 !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
      border-radius: 22px 22px 0 0 !important;
    }
    html[data-theme="dark"] .modal-header h2 { color: #f0f4ff !important; }
    html[data-theme="dark"] .modal-close { color: rgba(255,255,255,.4) !important; }
    html[data-theme="dark"] .modal-close:hover {
      background: rgba(255,77,106,.12) !important;
      color: #FF4D6A !important;
    }
    html[data-theme="dark"] .modal-desc { color: rgba(240,244,255,.8) !important; }
    html[data-theme="dark"] .modal-info-item {
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.08) !important;
    }
    html[data-theme="dark"] .modal-info-label { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .modal-info-val   { color: #f0f4ff !important; }
    html[data-theme="dark"] .calc-section { border-top: 1px solid rgba(255,255,255,.08) !important; }
    html[data-theme="dark"] .calc-title   { color: #f0f4ff !important; }
    html[data-theme="dark"] .calc-field label { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .calc-field input,
    html[data-theme="dark"] .calc-field select {
      background: rgba(255,255,255,.05) !important;
      border: 1.5px solid rgba(255,255,255,.1) !important;
      color: #f0f4ff !important;
    }
    html[data-theme="dark"] .calc-field input:focus,
    html[data-theme="dark"] .calc-field select:focus {
      border-color: rgba(0,212,200,.5) !important;
      background: rgba(0,212,200,.04) !important;
    }
    html[data-theme="dark"] .calc-field input::placeholder { color: rgba(255,255,255,.28) !important; }
    html[data-theme="dark"] .calc-field select option {
      background: #0d1220 !important;
      color: #f0f4ff !important;
    }
    html[data-theme="dark"] input[type="range"] { background: rgba(255,255,255,.12) !important; }
    html[data-theme="dark"] .calc-range-label   { color: rgba(255,255,255,.45) !important; }
    html[data-theme="dark"] .calc-range-val     { color: #00D4C8 !important; }
    html[data-theme="dark"] .live-price-warn { color: #FFB020 !important; }
    html[data-theme="dark"] .toast {
      background: rgba(13,18,32,.95) !important;
      border: 1px solid rgba(255,255,255,.08) !important;
    }

    /* ══════════════════════════════════════
       LIGHT THEME OVERRIDES
    ══════════════════════════════════════ */
    html[data-theme="light"] body {
      background: #f1f5f9 !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] .sidebar {
      background: #ffffff !important;
      border-right: 1px solid #e2e8f0 !important;
    }
    html[data-theme="light"] .sb-name  { color: #0f172a !important; }
    html[data-theme="light"] .sb-sub, html[data-theme="light"] .sb-uemail { color: #64748b !important; }
    html[data-theme="light"] .nav-item { color: #475569 !important; }
    html[data-theme="light"] .nav-item:hover { background: #f1f5f9 !important; color: #0f172a !important; }
    html[data-theme="light"] .nav-item.active {
      background: linear-gradient(135deg,#4f46e5,#7c3aed) !important;
      color: #fff !important;
    }
    html[data-theme="light"] .sb-user-row { background: #f8fafc !important; }
    html[data-theme="light"] .sb-uname { color: #0f172a !important; }
    html[data-theme="light"] .top-nav {
      background: rgba(255,255,255,0.96) !important;
      border-bottom: 1px solid #e2e8f0 !important;
    }
    html[data-theme="light"] .top-nav * { color: #0f172a !important; }
    html[data-theme="light"] .page-header h1 { color: #0f172a !important; }
    html[data-theme="light"] .page-header p  { color: #475569 !important; }
    html[data-theme="light"] .inv-card {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
    }
    html[data-theme="light"] .inv-card h3 { color: #0f172a !important; }
    html[data-theme="light"] .inv-card-desc { color: #475569 !important; }
    html[data-theme="light"] .inv-card-footer { border-top: 1px solid #e2e8f0 !important; }
    html[data-theme="light"] .inv-card-footer span { color: #4f46e5 !important; }
    html[data-theme="light"] .inv-card-arrow { color: #94a3b8 !important; }

    /* Modal — light */
    html[data-theme="light"] .modal-box {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      color: #0f172a !important;
      box-shadow: 0 28px 70px rgba(0,0,0,.15) !important;
    }
    html[data-theme="light"] .modal-header {
      background: #ffffff !important;
      border-bottom: 1px solid #e2e8f0 !important;
    }
    html[data-theme="light"] .modal-header h2 { color: #0f172a !important; }
    html[data-theme="light"] .modal-close { color: #64748b !important; }
    html[data-theme="light"] .modal-desc { color: #374151 !important; }
    html[data-theme="light"] .modal-info-item {
      background: #f8fafc !important;
      border: 1px solid #e2e8f0 !important;
    }
    html[data-theme="light"] .modal-info-label { color: #64748b !important; }
    html[data-theme="light"] .modal-info-val   { color: #0f172a !important; }
    html[data-theme="light"] .calc-section { border-top: 2px solid #e2e8f0 !important; }
    html[data-theme="light"] .calc-title   { color: #0f172a !important; }
    html[data-theme="light"] .calc-field label { color: #475569 !important; }
    html[data-theme="light"] .calc-field input,
    html[data-theme="light"] .calc-field select {
      background: #f8fafc !important;
      border: 1.5px solid #e2e8f0 !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] .calc-field input::placeholder { color: #94a3b8 !important; }
    html[data-theme="light"] .calc-field select option {
      background: #ffffff !important;
      color: #0f172a !important;
    }
    html[data-theme="light"] input[type="range"] { background: #e2e8f0 !important; }
    html[data-theme="light"] .calc-range-label   { color: #475569 !important; }
    html[data-theme="light"] .calc-range-val     { color: #4f46e5 !important; }
    html[data-theme="light"] .toast {
      background: #0f172a !important;
      border: 1px solid #334155 !important;
    }
  </style>
</head>

<body>
  <div class="aurora"><div class="aurora-1"></div><div class="aurora-2"></div><div class="aurora-3"></div></div>

  <!-- POPUP MODAL -->

  <div class="toast" id="toast"><span id="toast-icon">✅</span> <span id="toast-text">Done!</span></div>

  <script>
    const API = 'http://127.0.0.1:8000';
    let currentUser = null;
    let metalRates = {};

    /* ─── SESSION ─── */
    function loadSession() {
      try { const s = localStorage.getItem('ft_user'); if (s) currentUser = JSON.parse(s); } catch (_) {}
      const logoutBtn = document.getElementById('sb-logout-btn');
      logoutBtn.style.display = 'none';
      if (currentUser) {
        document.getElementById('sb-av').textContent = currentUser.initials || (currentUser.fullName || currentUser.name || 'U')[0].toUpperCase();
        document.getElementById('sb-uname').textContent = currentUser.fullName || currentUser.name || 'User';
        document.getElementById('sb-uemail').textContent = currentUser.email || '—';
        logoutBtn.style.display = 'flex';
      } else { injectGuestBanner(); }
    }

    function injectGuestBanner() {
      if (document.getElementById('guest-banner')) return;
      const b = document.createElement('div');
      b.id = 'guest-banner';
      b.style.cssText = 'position:sticky;top:0;z-index:9998;background:linear-gradient(90deg,#00D4C8,#006B66);color:#000;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;font-family:Inter,sans-serif;font-size:.82rem;font-weight:600;box-shadow:0 2px 12px rgba(0,212,200,.35);flex-wrap:wrap;gap:8px;';
      b.innerHTML = '<span>Log in to save history & get personalised advice.</span><div style="display:flex;gap:10px"><a href="Home.html" style="padding:6px 16px;border-radius:7px;border:1.5px solid rgba(0,0,0,.25);background:rgba(0,0,0,.12);color:#000;font-family:Inter,sans-serif;font-size:.78rem;font-weight:700;text-decoration:none">Login →</a><button onclick="this.closest(\'#guest-banner\').remove()" style="background:none;border:none;color:rgba(0,0,0,.5);cursor:pointer;font-size:1rem">✕</button></div>';
      document.querySelector('.main').prepend(b);
    }

    function doLogout() {
      localStorage.removeItem('ft_user'); localStorage.removeItem('ft_ob'); localStorage.removeItem('ft_P');
      window.location.href = 'Home.html';
    }

    /* ── Hardcoded fallback rates (approximate Indian market rates) ── */
    const FALLBACK_RATES = {
      Gold: { '24KT': 7200, '22KT': 6600, '18KT': 5400 },
      Silver: { perGram: 90 }
    };

    async function fetchMetalRates() {
      /* 1. Try live API */
      try {
        const today = new Date().toISOString().split('T')[0];
        const res = await fetch(`${API}/metal-rates?date=${today}`, { signal: AbortSignal.timeout(4000) });
        if (!res.ok) throw new Error('bad status');
        const data = await res.json();
        if (data.rates && data.rates.length) {
          data.rates.forEach(r => {
            if (!metalRates[r.metal]) metalRates[r.metal] = {};
            /* Normalise silver — API may send karat as "Silver" or "999" */
            if (r.metal === 'Silver') metalRates['Silver'].perGram = parseFloat(r.price);
            else metalRates[r.metal][r.karat] = parseFloat(r.price);
          });
          /* Cache for offline use */
          localStorage.setItem('inv_metalRates', JSON.stringify(metalRates));
          localStorage.setItem('inv_metalRates_ts', Date.now());
          return;
        }
      } catch (e) { console.warn('Live metal rates failed:', e.message); }

      /* 2. Try localStorage cache (saved by index.html or previous visit) */
      try {
        const cached = localStorage.getItem('inv_metalRates');
        const ts     = parseInt(localStorage.getItem('inv_metalRates_ts') || '0');
        if (cached && (Date.now() - ts) < 24 * 60 * 60 * 1000) {
          metalRates = JSON.parse(cached);
          console.info('Using cached metal rates');
          return;
        }
        /* Also try rates saved by index.html (different keys) */
        const g22 = parseFloat(localStorage.getItem('lastGoldRate'));
        const sv  = parseFloat(localStorage.getItem('lastSilverRate'));
        if (g22 && sv) {
          metalRates['Gold']   = { '22KT': g22, '24KT': Math.round(g22 * 1.09), '18KT': Math.round(g22 * 0.82) };
          metalRates['Silver'] = { perGram: sv };
          console.info('Using index.html cached rates');
          return;
        }
      } catch (_) {}

      /* 3. Hardcoded fallback */
      metalRates = JSON.parse(JSON.stringify(FALLBACK_RATES));
      console.info('Using hardcoded fallback rates');
    }

    const INVESTMENTS = [
      { id:'gold',         name:'Gold',          icon:'🪙', bg:'linear-gradient(135deg,#fef3c7,#fde68a)', shortDesc:'Invest in physical gold, Gold ETFs, or Sovereign Gold Bonds. A timeless hedge against inflation.', desc:'Gold is one of the oldest and most trusted investment assets in India.', returnRange:'8-12%', lockIn:'None', taxInfo:'LTCG 20% with indexation (>3yr)' },
      { id:'silver',       name:'Silver',         icon:'⬜', bg:'linear-gradient(135deg,#f1f5f9,#e2e8f0)', shortDesc:'A precious metal with growing industrial demand. Invest via physical silver or Silver ETFs.', desc:'Silver is both a precious metal and an industrial commodity.', returnRange:'6-14%', lockIn:'None', taxInfo:'LTCG 20% with indexation (>3yr)' },
      { id:'bitcoin',      name:'Bitcoin',        icon:'₿',  bg:'linear-gradient(135deg,#fef3c7,#fcd34d)', shortDesc:"The world's leading cryptocurrency. High potential returns with significant volatility.", desc:'Bitcoin is a decentralized digital currency — high risk, high reward.', returnRange:'Variable', lockIn:'None', taxInfo:'30% flat tax on gains + 1% TDS' },
      { id:'mutual-funds', name:'Mutual Funds',   icon:'📊', bg:'linear-gradient(135deg,#eef2ff,#c7d2fe)', shortDesc:'Professionally managed investment pools. Choose from Equity, Debt, Hybrid or Index funds.', desc:'Mutual funds pool money from multiple investors to invest in stocks, bonds, or other securities.', returnRange:'10-15%', lockIn:'None (ELSS 3yr)', taxInfo:'LTCG >₹1L at 10%; STCG 15%' },
      { id:'fd',           name:'Fixed Deposit',  icon:'🏦', bg:'linear-gradient(135deg,#dcfce7,#bbf7d0)', shortDesc:"Guaranteed returns with zero market risk. India's most popular safe investment.", desc:'Fixed Deposits are one of the safest investment instruments in India.', returnRange:'6.5-7.5%', lockIn:'Flexible (tax-saver: 5yr)', taxInfo:'Interest taxed per income slab; TDS applies' },
      { id:'insurance',    name:'Insurance',      icon:'🛡️', bg:'linear-gradient(135deg,#fee2e2,#fecaca)', shortDesc:'Financial protection for your family. Includes Term Life, Endowment, ULIPs, and Health plans.', desc:'Insurance provides financial protection against life uncertainties.', returnRange:'4-8% (endowment)', lockIn:'Policy term (5-30yr)', taxInfo:'80C deduction; 10(10D) maturity exempt' },
      { id:'sip',          name:'SIP',            icon:'📈', bg:'linear-gradient(135deg,#f3e8ff,#e9d5ff)', shortDesc:'Invest a fixed amount monthly in mutual funds. Harnesses rupee cost averaging & compounding.', desc:'Systematic Investment Plan (SIP) allows you to invest a fixed amount regularly in mutual funds.', returnRange:'12-15%', lockIn:'None (ELSS 3yr)', taxInfo:'Equity LTCG >₹1L at 10%; STCG 15%' },
      { id:'swp',          name:'SWP',            icon:'💸', bg:'linear-gradient(135deg,#e0f2fe,#bae6fd)', shortDesc:'Withdraw a fixed amount regularly from your mutual fund. Ideal for creating passive income.', desc:'Systematic Withdrawal Plan (SWP) lets you withdraw a fixed amount regularly.', returnRange:'8-12%', lockIn:'None', taxInfo:'Gains taxed per fund type and holding period' },
    ];

    function renderCards() {
      document.getElementById('inv-grid').innerHTML = INVESTMENTS.map(inv => `
        <div class="inv-card" onclick="openModal('${inv.id}')">
          <div class="inv-card-icon" style="background:${inv.bg}">${inv.icon}</div>
          <h3>${inv.name}</h3>
          <div class="inv-card-desc">${inv.shortDesc}</div>
          <div class="inv-card-footer">
            <span>View Details</span>
            <span class="inv-card-arrow">→</span>
          </div>
        </div>`).join('');
    }

    function openModal(id) {
      const inv = INVESTMENTS.find(i => i.id === id);
      if (!inv) return;
      document.getElementById('modal-icon').style.background = inv.bg;
      document.getElementById('modal-icon').textContent = inv.icon;
      document.getElementById('modal-title').textContent = inv.name;
      let bodyHTML = `<div class="modal-desc">${inv.desc}</div>
        <div class="modal-info-grid">
          <div class="modal-info-item"><div class="modal-info-label">Expected Returns</div><div class="modal-info-val">${inv.returnRange}</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Lock-in Period</div><div class="modal-info-val">${inv.lockIn}</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Taxation</div><div class="modal-info-val" style="font-size:.76rem">${inv.taxInfo}</div></div>
        </div>`;
      if      (id === 'gold')         bodyHTML += buildGoldCalc();
      else if (id === 'silver')       bodyHTML += buildSilverCalc();
      else if (id === 'mutual-funds') bodyHTML += buildMFCalc();
      else if (id === 'fd')           bodyHTML += buildFDCalc();
      else if (id === 'sip')          bodyHTML += buildSIPCalc();
      else if (id === 'swp')          bodyHTML += buildSWPCalc();
      bodyHTML += `<div style="margin-top:18px"><a class="modal-know-more" href="investment-detail.html?type=${id}">📖 Know More →</a></div>`;
      document.getElementById('modal-body').innerHTML = bodyHTML;
      document.getElementById('inv-modal').classList.add('open');
    }
    function closeModal() { document.getElementById('inv-modal').classList.remove('open'); }

    function buildGoldCalc() {
      const g = metalRates['Gold'] || {};
      const isFallback = g['24KT'] && g['24KT'] === FALLBACK_RATES.Gold['24KT'];
      const karatKeys = Object.keys(g);
      const priceStrip = karatKeys.length
        ? `<div class="live-price-strip">
            ${g['24KT'] ? `<div class="live-price-box"><div class="lp-label">24KT/g${isFallback?' (est.)':''}</div><div class="lp-val">&#8377;${g['24KT'].toLocaleString('en-IN')}</div></div>` : ''}
            ${g['22KT'] ? `<div class="live-price-box"><div class="lp-label">22KT/g${isFallback?' (est.)':''}</div><div class="lp-val">&#8377;${g['22KT'].toLocaleString('en-IN')}</div></div>` : ''}
            ${g['18KT'] ? `<div class="live-price-box"><div class="lp-label">18KT/g${isFallback?' (est.)':''}</div><div class="lp-val">&#8377;${g['18KT'].toLocaleString('en-IN')}</div></div>` : ''}
           </div>${isFallback ? '<p style="font-size:.76rem;color:var(--amber);margin-bottom:8px;margin-top:-4px">&#9432; Showing estimated rates — live API unavailable</p>' : ''}`
        : '<p style="font-size:.82rem;color:var(--amber);margin-bottom:12px">&#9888; Live prices unavailable.</p>';
      return `<div class="calc-section">
        <div class="calc-title">&#127885; Today's Gold Prices</div>${priceStrip}
        <div class="calc-title" style="margin-top:14px">&#129518; Calculator</div>
        <div class="calc-row">
          <div class="calc-field"><label>Karat</label>
            <select id="gold-karat" onchange="calcGold()">
              ${karatKeys.map(k => `<option value="${k}">${k}</option>`).join('') || '<option value="">N/A</option>'}
            </select>
          </div>
          <div class="calc-field"><label>Weight (g)</label>
            <input type="number" id="gold-grams" placeholder="10" value="1" min="0.1" step="0.1" oninput="calcGold()"/>
          </div>
        </div>
        <div class="calc-result" id="gold-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Enter weight to see cost</div></div>
      </div>`;
    }
    function calcGold() {
      const g = metalRates['Gold'] || {};
      const karat = document.getElementById('gold-karat') && document.getElementById('gold-karat').value;
      const grams = parseFloat(document.getElementById('gold-grams') && document.getElementById('gold-grams').value) || 0;
      const price = g[karat] || 0;
      if (!price || !grams) { document.getElementById('gold-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Enter weight to see cost</div>'; return; }
      const total = price * grams;
      const isFallback = price === FALLBACK_RATES.Gold[karat];
      document.getElementById('gold-result').innerHTML =
        '<div class="calc-results-grid">' +
        '<div class="calc-res-item"><div class="calc-res-label">Price/gram</div><div class="calc-res-val">&#8377;' + price.toLocaleString('en-IN') + '</div></div>' +
        '<div class="calc-res-item"><div class="calc-res-label">Total for ' + grams + 'g</div><div class="calc-res-val">&#8377;' + Math.round(total).toLocaleString('en-IN') + '</div></div>' +
        '</div><div class="calc-result-sub">' + karat + ' &middot; ' + grams + 'g &middot; ' + (isFallback ? 'estimated rate' : "today's rate") + '</div>';
    }
    function buildSilverCalc() {
      const sp = (metalRates['Silver'] || {}).perGram || 0;
      const isFallback = sp && sp === FALLBACK_RATES.Silver.perGram;
      const strip = sp
        ? `<div class="live-price-strip"><div class="live-price-box silver-box"><div class="lp-label">Silver/g${isFallback ? ' (est.)' : ''}</div><div class="lp-val">&#8377;${sp.toLocaleString('en-IN')}</div></div></div>`
        : '<p style="font-size:.82rem;color:var(--amber);margin-bottom:12px">&#9888; Live prices unavailable.</p>';
      return `<div class="calc-section">
        <div class="calc-title">&#11036; Today's Silver Prices</div>${strip}
        <div class="calc-title" style="margin-top:14px">&#129518; Calculator</div>
        <div class="calc-row full"><div class="calc-field"><label>Weight (g)</label><input type="number" id="silver-grams" placeholder="100" value="1" min="0.1" step="0.1" oninput="calcSilver()"/></div></div>
        <div class="calc-result" id="silver-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Enter weight to see cost</div></div>
      </div>`;
    }
    function calcSilver() {
      const p = (metalRates['Silver'] || {}).perGram || 0;
      const g = parseFloat(document.getElementById('silver-grams').value) || 0;
      if (!p || !g) { document.getElementById('silver-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Enter weight to see cost</div>'; return; }
      const total = p * g;
      const isFallback = p === FALLBACK_RATES.Silver.perGram;
      document.getElementById('silver-result').innerHTML =
        '<div class="calc-results-grid">' +
        '<div class="calc-res-item"><div class="calc-res-label">Price/gram</div><div class="calc-res-val">&#8377;' + p.toLocaleString('en-IN') + '</div></div>' +
        '<div class="calc-res-item"><div class="calc-res-label">Total for ' + g + 'g</div><div class="calc-res-val">&#8377;' + Math.round(total).toLocaleString('en-IN') + '</div></div>' +
        '</div>' +
        '<div class="calc-result-sub">Silver &middot; ' + g + 'g &middot; ' + (isFallback ? 'estimated rate' : "today\'s rate") + '</div>';
    }
    function buildMFCalc() { return `<div class="calc-section"><div class="calc-title">🧮 MF Returns</div><div class="calc-row"><div class="calc-field"><label>Mode</label><select id="mf-mode" onchange="calcMF()"><option value="sip">SIP (Monthly)</option><option value="lumpsum">Lump Sum</option></select></div><div class="calc-field"><label>Amount (₹)</label><input type="number" id="mf-amount" placeholder="5000" oninput="calcMF()"/></div></div><div class="calc-row"><div class="calc-field"><label>Return % p.a.</label><input type="number" id="mf-rate" placeholder="12" value="12" oninput="calcMF()"/></div><div class="calc-field"><label>Years</label><input type="number" id="mf-tenure" placeholder="10" value="10" oninput="calcMF()"/></div></div><div class="calc-result" id="mf-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs to see returns</div></div></div>`; }
    function calcMF() { const mode = document.getElementById('mf-mode')?.value, amt = parseFloat(document.getElementById('mf-amount')?.value) || 0, rate = parseFloat(document.getElementById('mf-rate')?.value) || 0, yrs = parseInt(document.getElementById('mf-tenure')?.value) || 0; if (!amt || !rate || !yrs) { document.getElementById('mf-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div>'; return; } let fv, inv; if (mode === 'sip') { const r = rate / 100 / 12, n = yrs * 12; fv = amt * ((Math.pow(1 + r, n) - 1) / r) * (1 + r); inv = amt * n; } else { fv = amt * Math.pow(1 + rate / 100, yrs); inv = amt; } const gain = fv - inv; document.getElementById('mf-result').innerHTML = `<div class="calc-results-grid"><div class="calc-res-item"><div class="calc-res-label">Invested</div><div class="calc-res-val">₹${Math.round(inv).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Returns</div><div class="calc-res-val">₹${Math.round(gain).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Total Value</div><div class="calc-res-val">₹${Math.round(fv).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Gain</div><div class="calc-res-val">${Math.round(gain / inv * 100)}%</div></div></div><div class="calc-result-sub">${mode === 'sip' ? 'SIP' : 'Lump Sum'} · ${rate}% p.a. · ${yrs}yr</div>`; }
    function buildFDCalc() { return `<div class="calc-section"><div class="calc-title">🧮 FD Calculator</div><div class="calc-row"><div class="calc-field"><label>Principal (₹)</label><input type="number" id="fd-principal" placeholder="500000" oninput="calcFD()"/></div><div class="calc-field"><label>Rate % p.a.</label><input type="number" id="fd-rate" placeholder="7" value="7" step="0.1" oninput="calcFD()"/></div></div><div class="calc-range-wrap"><div class="calc-range-label"><span>Tenure</span><span class="calc-range-val" id="fd-range-val">1 Year</span></div><input type="range" id="fd-tenure" min="1" max="10" value="1" oninput="calcFD()"/></div><div class="calc-result" id="fd-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div></div></div>`; }
    function calcFD() { const p = parseFloat(document.getElementById('fd-principal')?.value) || 0, r = parseFloat(document.getElementById('fd-rate')?.value) || 0, y = parseInt(document.getElementById('fd-tenure')?.value) || 1; document.getElementById('fd-range-val').textContent = y + (y === 1 ? ' Year' : ' Years'); if (!p || !r) { document.getElementById('fd-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div>'; return; } const fv = p * Math.pow(1 + r / 100, y), int = fv - p; document.getElementById('fd-result').innerHTML = `<div class="calc-results-grid"><div class="calc-res-item"><div class="calc-res-label">Principal</div><div class="calc-res-val">₹${Math.round(p).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Interest</div><div class="calc-res-val">₹${Math.round(int).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Maturity</div><div class="calc-res-val">₹${Math.round(fv).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Return</div><div class="calc-res-val">${Math.round(int / p * 100)}%</div></div></div>`; }
    function buildSIPCalc() { return `<div class="calc-section"><div class="calc-title">🧮 SIP Calculator</div><div class="calc-row"><div class="calc-field"><label>Monthly SIP (₹)</label><input type="number" id="sip-amount" placeholder="5000" oninput="calcSIP()"/></div><div class="calc-field"><label>Return % p.a.</label><input type="number" id="sip-rate" placeholder="12" value="12" oninput="calcSIP()"/></div></div><div class="calc-range-wrap"><div class="calc-range-label"><span>Period</span><span class="calc-range-val" id="sip-range-val">5 Years</span></div><input type="range" id="sip-tenure" min="1" max="30" value="5" oninput="calcSIP()"/></div><div class="calc-result" id="sip-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div></div></div>`; }
    function calcSIP() { const p = parseFloat(document.getElementById('sip-amount')?.value) || 0, rate = parseFloat(document.getElementById('sip-rate')?.value) || 0, yrs = parseInt(document.getElementById('sip-tenure')?.value) || 1; document.getElementById('sip-range-val').textContent = yrs + (yrs === 1 ? ' Year' : ' Years'); if (!p || !rate) { document.getElementById('sip-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div>'; return; } const r = rate / 100 / 12, n = yrs * 12, fv = p * ((Math.pow(1 + r, n) - 1) / r) * (1 + r), inv = p * n, gain = fv - inv; document.getElementById('sip-result').innerHTML = `<div class="calc-results-grid"><div class="calc-res-item"><div class="calc-res-label">Invested</div><div class="calc-res-val">₹${Math.round(inv).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Returns</div><div class="calc-res-val">₹${Math.round(gain).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Total</div><div class="calc-res-val">₹${Math.round(fv).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Gain</div><div class="calc-res-val">${Math.round(gain / inv * 100)}%</div></div></div>`; }
    function buildSWPCalc() { return `<div class="calc-section"><div class="calc-title">🧮 SWP Calculator</div><div class="calc-row"><div class="calc-field"><label>Corpus (₹)</label><input type="number" id="swp-corpus" placeholder="5000000" oninput="calcSWP()"/></div><div class="calc-field"><label>Monthly Withdrawal (₹)</label><input type="number" id="swp-withdraw" placeholder="30000" oninput="calcSWP()"/></div></div><div class="calc-row"><div class="calc-field"><label>Return % p.a.</label><input type="number" id="swp-rate" placeholder="10" value="10" oninput="calcSWP()"/></div><div class="calc-field"><label>Duration (Years)</label><input type="number" id="swp-tenure" placeholder="10" value="10" oninput="calcSWP()"/></div></div><div class="calc-result" id="swp-result"><div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div></div></div>`; }
    function calcSWP() { const c = parseFloat(document.getElementById('swp-corpus')?.value) || 0, w = parseFloat(document.getElementById('swp-withdraw')?.value) || 0, rate = parseFloat(document.getElementById('swp-rate')?.value) || 0, yrs = parseInt(document.getElementById('swp-tenure')?.value) || 0; if (!c || !w || !rate || !yrs) { document.getElementById('swp-result').innerHTML = '<div style="text-align:center;opacity:.7;font-size:.82rem">Fill inputs</div>'; return; } const r = rate / 100 / 12, n = yrs * 12; let bal = c; for (let i = 0; i < n; i++) { bal = bal * (1 + r) - w; if (bal < 0) { bal = 0; break; } } const tw = w * n; document.getElementById('swp-result').innerHTML = `<div class="calc-results-grid"><div class="calc-res-item"><div class="calc-res-label">Total Withdrawn</div><div class="calc-res-val">₹${Math.round(tw).toLocaleString('en-IN')}</div></div><div class="calc-res-item"><div class="calc-res-label">Remaining</div><div class="calc-res-val">₹${Math.round(bal).toLocaleString('en-IN')}</div></div></div>`; }

    function showToast(icon, msg) { document.getElementById('toast-icon').textContent = icon; document.getElementById('toast-text').textContent = msg; const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3200); }

    document.addEventListener('DOMContentLoaded', async () => {
      loadSession();
      await fetchMetalRates();
      renderCards();
      document.getElementById('inv-modal').addEventListener('click', e => { if (e.target.id === 'inv-modal') closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    });
  </script>
